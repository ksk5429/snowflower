long_form_text: |
  Most people carry a hands-free input system in their pocket and don't know it.

  This piece walks through five built-in tools — Apple AssistiveTouch, Apple Voice
  Control, Windows Eye Control, Android Switch Access, and Talon Voice — and what
  each one actually does. No purchase required. The point is not "switch to these
  forever," but: if you suddenly couldn't use your hands tomorrow, what would
  still work?

  In future episodes, we cover the dedicated devices people graduate to: head
  mice (Quha Zono 2, Glassouse), eye trackers (Tobii Eye Tracker 5), and intraoral
  controllers (MouthPad^ from augmental.tech). Those exist because the built-ins
  hit a ceiling — but the built-ins are the right place to start.

short_text: |
  5 hands-free input tools already on your phone, tablet, or laptop. No purchase.
  Foundation for snowflower's coverage of dedicated assistive devices.

