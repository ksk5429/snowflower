id: ep001
title: "What if you couldn't use your hands? 5 free hands-free input tools you already own"
description: |
  A neutral primer on hands-free input. We cover five tools shipped with iOS,
  iPadOS, macOS, Windows, and Android — all free, all already on a device most
  viewers carry. This is the foundation for later snowflower coverage of
  dedicated assistive devices like Quha Zono 2, Glassouse V2, and MouthPad^.

